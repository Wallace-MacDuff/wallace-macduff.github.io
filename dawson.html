<script>
    const parchment = document.querySelector('.content-area');
    parchment.focus();
    let isDown = false;
    let startY;
    let scrollTop;

    parchment.addEventListener('mousedown', (e) => {
        isDown = true;
        startY = e.pageY - parchment.offsetTop;
        scrollTop = parchment.scrollTop;
    });

    parchment.addEventListener('mouseleave', () => {
        isDown = false;
    });

    parchment.addEventListener('mouseup', () => {
        isDown = false;
    });

    parchment.addEventListener('mousemove', (e) => {
        if (!isDown) return; 
        e.preventDefault(); 
        const y = e.pageY - parchment.offsetTop;
        const walk = (y - startY) * 1.5; 
        parchment.scrollTop = scrollTop - walk;
    });
</script>
