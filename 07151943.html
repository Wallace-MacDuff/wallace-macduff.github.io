<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>WallyVision</title>
    <style>
        /* 1. Basic TV Styling */
        body {
            margin: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. The Sidebar for Controls */
        #sidebar {
            width: 250px;
            background-color: #222;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-right: 1px solid #333;
            transition: all 0.3s ease-in-out;
            overflow: hidden;
            white-space: nowrap;
        }

        #sidebar.collapsed {
            width: 0;
            padding-left: 0;
            padding-right: 0;
            border-right: none;
        }

        .sidebar-controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            gap: 15px;
        }

        #sidebar h3 {
            text-align: center;
            margin: 10px 0 0 0;
            color: #aaa;
        }

        #sidebar button {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-align: center;
            transition: background 0.2s;
        }

        #sidebar button:hover {
            background-color: #666;
        }

        #viewer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #viewer-controls button {
            padding: 15px 0; 
            flex: 1; 
        }

        #viewer-controls button.hidden {
            display: none;
        }

        #viewer-controls button.active-viewer {
            font-weight: bold;
            border: 1px solid #00FFF0;
            background-color: #555; /* Slight pop for active viewer */
        }

        #menu-toggle {
            opacity: .2;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 10px 15px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #menu-toggle:hover {
            opacity: 1;
            background-color: #666;
        }

        #menu-toggle:focus {
            position: absolute !important;
        }

        /* 3. NEW: The Channel Modal Overlay */
          #channel-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(10, 10, 10, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centers everything vertically */
            padding: 2vh 0; /* Use vh instead of px */
            box-sizing: border-box;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
            overflow: hidden; /* STRICTLY disables scrolling */
          }

        #channel-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90vw; /* Scales with screen width */
            height: 8vh; /* Scales with screen height */
            margin-bottom: 2vh;
            border-bottom: 1px solid #333;
            padding-bottom: 1vh;
        }

        .modal-header h2 {
            margin: 0;
            color: #FFD700;
            font-size: 3.5vh; /* Text scales with the screen */
        }

        .modal-close-btn {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 1vh 2vw;
            border-radius: 0.5vw;
            cursor: pointer;
            font-size: 2vh;
        }

        /* Modal Grid Layout */
        .channel-roster-container {
            width: 90vw;
            height: 85vh; /* Fills exactly 85% of the screen height */
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; /* Distributes rows perfectly */
            gap: 1vh;
        }

        .channel-row-group {
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1vw;
            padding: 1vh;
        }

        .channel-row {
            display: flex;
            gap: 1vw;
            justify-content: center;
        }

       /* Channel Buttons */
       .channel-btn {
           background-color: #222;
           border: 2px solid #444;
           border-radius: 0.5vw;
           padding: 1vh;
           color: white;
           cursor: pointer;
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: space-evenly;
           width: 14vw;  /* Force width based on screen */
           height: 12vh; /* Force height based on screen */
           transition: all 0.2s;
           box-sizing: border-box;
       }

       .channel-btn:hover {
           border-color: #00FFF0;
           background-color: #333;
           transform: scale(1.05);
       }

       .channel-btn img {
           max-width: 90%;
           max-height: 5vh; /* Logos scale dynamically */
           object-fit: contain;
       }

       /* Affiliate Drawer */
       .affiliate-drawer {
           display: none;
           gap: 1vw;
           justify-content: center;
           margin-top: 1vh;
           padding-top: 1vh;
           border-top: 1px dashed #555;
       }

       .affiliate-drawer.active {
           display: flex;
       }

        /* 4. The Video Grid Layouts */
        #grid-container {
            flex-grow: 1;
            padding: 20px;
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        #grid-container.layout-2 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
        }

        #grid-container.layout-4 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        /* 5. The Individual Video Screens */
        .screen {
            background-color: #000;
            border: 1px solid #333;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #777;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .screen.hidden {
            display: none;
        }

        .screen.active {
            border: 1px solid rgba(0, 255, 255, 0.25);
            transform: scale(1.02);
        }
        
        /* Small text inside the screen to show the URL mapping works */
        .screen .url-text {
            font-size: 14px;
            color: #00FFF0;
            margin-top: 10px;
            word-break: break-all;
            padding: 0 20px;
        }

        /* 6. Live Video Iframe Styling */
        .screen iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 6px; /* Slightly smaller than the container to fit inside the border */
            background-color: #000;
        }

        /* === WALLY MASCOT / APP ICON === */
        #wally-mascot-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            margin-bottom: 5px;
        }

        #wally-app-icon {
            width: 246px;
            height: 246px;
            border-radius: 22px; /* Classic rounded app icon shape */
            border: 2px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            object-fit: cover; /* Prevents Wally from stretching if the image isn't a perfect square */
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        /* === STANDBY SCREENS === */
        .standby-mascot {
            width: 196px;
            height: 196px;
            border-radius: 20px;
            opacity: 0.3; /* Ghostly until selected */
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .standby-number {
            font-size: 80px;
            font-weight: bold;
            color: #333; /* Dark grey by default */
            line-height: 1;
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
            transition: all 0.2s;
        }

        /* When the screen is selected (Active Focus) */
        .active-mascot {
            opacity: 0.8;
            border: 2px solid #00FFF0;
        }

        .active-number {
            color: #00FFF0;
            text-shadow: 0 0 15px rgba(0, 255, 240, 0.4);
        }

        .standby-text {
            font-size: 14px;
            color: #00FFF0;
            margin-top: 15px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* A little hover effect in case you ever want to make him a clickable button! */
        #wally-app-icon:hover {
            transform: scale(1.05);
            border-color: #00FFF0;
        }

        /* === TV REMOTE FOCUS OUTLINES === */
        
        /* Remove the default ugly browser outline */
        button:focus, .channel-btn:focus, #menu-toggle:focus {
            outline: none;
        }

        /* The Custom TV Focus Ring */
        button:focus, #menu-toggle:focus {
            box-shadow: 0 0 0 4px #00FFF0 !important; /* Thick electric blue ring */
            background-color: #555;
            z-index: 10;
            position: relative; /* Keeps the ring on top of other elements */
        }

        /* Special focus for the channel roster to match your hover style */
        .channel-btn:focus {
            border-color: #00FFF0 !important;
            background-color: #333 !important;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 240, 0.5);
        }

        /* === CUSTOM ICON SIZING === */
        .img-boost-lg img {
            max-height: 9.25vh !important; /* Bumps the size up ~35% */
            max-width: 97% !important;     /* Gives it a little more horizontal breathing room */
        }

        /* 1. THE SPLASH CONTAINER */
        /* This covers the whole screen with your cream color */
        .splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #f4e8ce; 
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            
            /* Step 3: Fades the entire screen away after 3.5 seconds */
            animation: fadeOutSplash 1s ease 3.5s forwards;
        }

        /* 2. THE IMAGE WRAPPER */
        /* Keeps everything perfectly sized and stacked */
        .intro-wrapper {
            position: relative;
            width: 90%;
            max-width: 800px; /* Adjust this if you want the cows bigger/smaller */
        }

        /* 3. THE DIMMED BASE LAYER */
        .kilt-dimmed {
            width: 100%;
            height: auto;
            display: block;
            /* Washes the image out and dims it */
            filter: brightness(0.4) grayscale(60%); 
        }

        /* 4. THE BRIGHT REVEAL LAYER */
        .kilt-bright {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: auto;
            
            /* The Magic: This hides the bright image at first using a clipping mask */
            clip-path: inset(0 100% 0 0); 
            
            /* Step 2: Runs the spotlight sweep over 2 seconds, starting after a half-second pause */
            animation: spotlightSweep 2s ease-in-out 0.5s forwards;
        }

        /* --- THE ANIMATION KEYFRAMES --- */
        
        /* The Sweep: Uncovers the bright image from left to right */
        @keyframes spotlightSweep {
            0% { clip-path: inset(0 100% 0 0); } /* 100% hidden on the right */
            100% { clip-path: inset(0 0 0 0); }  /* 0% hidden (fully revealed) */
        }

        /* The Curtain: Fades the whole splash screen away */
        @keyframes fadeOutSplash {
            0% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }

    </style>
</head>
<body>
    <body>
    <div class="splash-screen" style="pointer-events: none;">
        <div class="intro-wrapper">
            <img src="images/wally-dark.png" alt="Dimmed Cows" class="kilt-dimmed">
            <img src="images/wally-light.png" alt="Bright Cows" class="kilt-bright">
        </div>
    </div>
    
    <button id="menu-toggle" onclick="toggleMenu()">☰ Menu</button>

    <div id="sidebar" class="collapsed">
        
        <button onclick="toggleMenu()" style="background-color: #d9534f;">Close Menu</button>

        <div id="wally-mascot-container">
            <img id="wally-app-icon" src="images/wally-large.png" alt="Wally MacDuff">
        </div>

        <div class="sidebar-controls">
            <h3>Mode</h3>
            <button onclick="changeLayout(1)">Single</button>
            <button onclick="changeLayout(2)">Double</button>
            <button onclick="changeLayout(4)">Quad</button>

            <div id="select-screen-section" style="display: none;"> <h3 style="margin-bottom: 15px;">Select Screen</h3>
                <div id="viewer-controls">
                    <button id="btn-select-1" class="active-viewer" onclick="selectScreen(1)">1</button>
                    <button id="btn-select-2" class="hidden" onclick="selectScreen(2)">2</button>
                    <button id="btn-select-3" class="hidden" onclick="selectScreen(3)">3</button>
                    <button id="btn-select-4" class="hidden" onclick="selectScreen(4)">4</button>
                </div>
            </div>

            <button onclick="openChannelModal()" style="background-color: #00FFF0; color: #111; font-weight: bold; margin-top: 20px;">
                Select Channel
            </button>
        </div>
    </div>

    <div id="channel-modal">
        <div class="modal-header">
            <h2>Channel Roster</h2>
            <button class="modal-close-btn" onclick="closeChannelModal()">X Close</button>
        </div>
        <div id="channel-roster-container" class="channel-roster-container"></div>
    </div>

    <div id="grid-container" class="layout-1">
        <div class="screen active" id="screen-1" onclick="selectScreen(1)">
            <img class="standby-mascot active-mascot" src="images/wally-large.png" alt="Wally">
            <div class="standby-number active-number">1</div>
        </div>
        <div class="screen hidden" id="screen-2" onclick="selectScreen(2)">
            <img class="standby-mascot" src="images/wally-large.png" alt="Wally">
            <div class="standby-number">2</div>
        </div>
        <div class="screen hidden" id="screen-3" onclick="selectScreen(3)">
            <img class="standby-mascot" src="images/wally-large.png" alt="Wally">
            <div class="standby-number">3</div>
        </div>
        <div class="screen hidden" id="screen-4" onclick="selectScreen(4)">
            <img class="standby-mascot" src="images/wally-large.png" alt="Wally">
            <div class="standby-number">4</div>
        </div>
    </div>

    <script>

        const channelRows = [
            // ROW 1: ESPN Block
            [
                { name: "ESPN", url: "https://dlstreams.top/stream/stream-44.php", logo: "https://upload.wikimedia.org/wikipedia/commons/9/99/ESPN_logo.png", boost: "img-boost-lg" },

            // ROW 2: Fox/College
            [

                { name: "FS2", url: "https://dlstreams.top/stream/stream-758.php", logo: "https://upload.wikimedia.org/wikipedia/commons/3/38/FS2_logo_2015.svg" },

            [
                { name: "NBC BAY", url: "https://dlstreams.top/stream/stream-753.php", logo: "https://upload.wikimedia.org/wikipedia/commons/b/be/NBC_Sports_Bay_Area_2023.svg" },
                { name: "NBC BOS", url: "https://dlstreams.top/stream/stream-754.php", logo: "https://upload.wikimedia.org/wikipedia/commons/5/5b/NBC_Sports_Boston_2023.svg" },
                { name: "NBC CAL", url: "https://dlstreams.top/stream/stream-755.php", logo: "https://upload.wikimedia.org/wikipedia/commons/5/55/NBC_Sports_California_2023.svg" },
                { name: "NBC PHI", url: "https://dlstreams.top/stream/stream-777.php", logo: "https://upload.wikimedia.org/wikipedia/commons/7/75/NBC_Sports_Philadelphia_Plus_2023.svg" }
            ],
            // ROW 4: Turner/USA
            [
                { name: "TBS", url: "https://dlstreams.top/stream/stream-336.php", logo: "https://upload.wikimedia.org/wikipedia/commons/2/2c/TBS_2020.svg" },
                { name: "TNT", url: "https://dlstreams.top/stream/stream-338.php", logo: "https://upload.wikimedia.org/wikipedia/commons/3/32/Tnt_tv_logo_old.svg", boost: "img-boost-lg" },
                { name: "TRUTV", url: "https://dlstreams.top/stream/stream-341.php", logo: "https://www.trutv.com/themes/custom/ten_theme/images/trutv/trutv_logo_top.png" },
                { name: "USA", url: "https://dlstreams.top/stream/stream-343.php", logo: "https://upload.wikimedia.org/wikipedia/commons/d/d7/USA_Network_logo_%282016%29.svg" }
            ],
            // ROW 5: Networks (With Affiliate Drawers)
            [
                { 
                    name: "ABC", logo: "https://upload.wikimedia.org/wikipedia/commons/2/2f/ABC-2021-LOGO.svg", boost: "img-boost-lg",
                    affiliates: [
                        { name: "ABC ATL", url: "https://dlstreams.top/stream/stream-51.php", logo: "https://upload.wikimedia.org/wikipedia/commons/3/38/WSB-TV_2_logo.png" },

                    ]
                },
                { 
                    name: "CBS", logo: "https://upload.wikimedia.org/wikipedia/commons/b/bd/CBS_Eyemark.svg", boost: "img-boost-lg",
                    affiliates: [
                        { name: "CBS MIA", url: "https://dlstreams.top/stream/stream-52.php", logo: "https://upload.wikimedia.org/wikipedia/commons/b/be/Current_logo_of_WFOR-TV.svg" },
                        { name: "CBS NYC", url: "https://dlstreams.top/stream/stream-767.php", logo: "https://upload.wikimedia.org/wikipedia/commons/5/51/WCBS-TV_logo_%282023%29.svg" }
                    ]
                },
                { 
                    name: "FOX", logo: "https://upload.wikimedia.org/wikipedia/commons/c/c0/Fox_Broadcasting_Company_logo_%282019%29.svg",
                    affiliates: [
                        { name: "FOX MIA", url: "https://dlstreams.top/stream/stream-54.php", logo: "https://upload.wikimedia.org/wikipedia/commons/6/64/WSVN_7_logo_%281983%E2%80%93present%29.svg" },
                        { name: "FOX NYC", url: "https://dlstreams.top/stream/stream-768.php", logo: "https://upload.wikimedia.org/wikipedia/commons/2/2a/Fts-new-york-a.svg" }
                    ]
                },
                { 
                    name: "NBC", logo: "https://upload.wikimedia.org/wikipedia/commons/7/7a/NBC_logo_2022_%28vertical%29.svg", boost: "img-boost-lg",
                    affiliates: [
                        { name: "NBC PHI", url: "https://dlstreams.top/stream/stream-277.php", logo: "https://upload.wikimedia.org/wikipedia/commons/2/20/WCAU_2023.svg" },
                        { name: "NBC CHI", url: "https://dlstreams.top/stream/stream-53.php", logo: "https://upload.wikimedia.org/wikipedia/commons/6/69/WMAQ_2023.svg" },
                        { name: "NBC NYC", url: "https://dlstreams.top/stream/stream-769.php", logo: "https://upload.wikimedia.org/wikipedia/commons/8/8d/WNBC_2023.svg" }
                    ]
                }
            ], 
            // ROW 6: Entertainment
            [
                { name: "MTV", url: "https://dlstreams.top/stream/stream-371.php", logo: "https://upload.wikimedia.org/wikipedia/commons/6/68/MTV_2021_%28brand_version%29.svg" },
                { name: "NICK", url: "https://dlstreams.top/stream/stream-330.php", logo: "https://upload.wikimedia.org/wikipedia/commons/2/23/Short_Nick_2023.png", boost: "img-boost-lg" },
                { name: "TV LAND", url: "https://dlstreams.top/stream/stream-342.php", logo: "https://upload.wikimedia.org/wikipedia/commons/8/87/TV_Land_2015_logo.svg" },
                { name: "IFC", url: "https://dlstreams.top/stream/stream-656.php", logo: "https://upload.wikimedia.org/wikipedia/commons/5/50/IFC_2018_logo.svg" },
                { name: "COMEDY CENTRAL", url: "https://dlstreams.top/stream/stream-310.php", logo: "https://upload.wikimedia.org/wikipedia/commons/a/aa/Comedy_Central_2018.svg" }
            ]
        ];

        // === INITIALIZATION & MODAL LOGIC ===
        
        // This function builds the channel UI dynamically based on the array
        function buildChannelGrid() {
            const container = document.getElementById('channel-roster-container');
            container.innerHTML = ''; // Clear existing

            channelRows.forEach(row => {
                // Wrapper for the row and its potential affiliate drawer
                const groupDiv = document.createElement('div');
                groupDiv.className = 'channel-row-group';

                const rowDiv = document.createElement('div');
                rowDiv.className = 'channel-row';

                const drawerDiv = document.createElement('div');
                drawerDiv.className = 'affiliate-drawer';

                row.forEach(channel => {
                    const btn = document.createElement('button');
                    btn.className = 'channel-btn';
                    if(channel.boost) btn.classList.add(channel.boost);
                    
                    btn.innerHTML = `
                        <img src="${channel.logo}" alt="${channel.name}">
                    `;

                    // If it's a network with affiliates
                    if (channel.affiliates) {
                        btn.onclick = () => {
                            // Clear and populate the drawer below this specific row
                            drawerDiv.innerHTML = ''; 
                            channel.affiliates.forEach(aff => {
                                const affBtn = document.createElement('button');
                                affBtn.className = 'channel-btn';
                                affBtn.innerHTML = `
                                    <img src="${aff.logo}" alt="${aff.name}">
                                    <span>${aff.name}</span>
                                `;
                                affBtn.onclick = () => {
                                    setChannel(aff.name, aff.url);
                                    closeChannelModal();
                                    toggleMenu(); // Automatically close the sidebar too!
                                };
                                drawerDiv.appendChild(affBtn);
                            });
                            // Toggle the drawer open
                            drawerDiv.classList.add('active');
                        };
                    } 
                    // If it's a direct channel URL
                    else {
                        btn.onclick = () => {
                            setChannel(channel.name, channel.url);
                            closeChannelModal();
                            toggleMenu(); // Automatically close the sidebar too!
                        };
                    }

                    rowDiv.appendChild(btn);
                });

                groupDiv.appendChild(rowDiv);
                groupDiv.appendChild(drawerDiv);
                container.appendChild(groupDiv);
            });
        }

        // Run the builder when the page loads
        buildChannelGrid();

        function openChannelModal() {
            document.getElementById('channel-modal').classList.add('active');
            
            // THE FIX: Wait a tiny fraction of a second for the modal to become visible, 
            // then immediately snap the TV remote focus to the first channel button (ESPN)
            setTimeout(() => {
                const firstChannel = document.querySelector('.channel-btn');
                if (firstChannel) firstChannel.focus();
            }, 50); 
        }

        function closeChannelModal() {
            document.getElementById('channel-modal').classList.remove('active');
            
            // Optional: Close any open affiliate drawers when the modal closes
            document.querySelectorAll('.affiliate-drawer').forEach(drawer => {
                drawer.classList.remove('active');
            });
        }


        // === EXISTING TV LOGIC ===
        
        let activeScreenId = 1;

        function changeLayout(numberOfScreens) {
            const grid = document.getElementById('grid-container');
            grid.className = 'layout-' + numberOfScreens;

            for (let i = 1; i <= 4; i++) {
                const screen = document.getElementById('screen-' + i);
                const selectBtn = document.getElementById('btn-select-' + i); 
                
                if (i <= numberOfScreens) {
                    screen.classList.remove('hidden');
                    selectBtn.classList.remove('hidden'); 
                } else {
                    screen.classList.add('hidden');
                    selectBtn.classList.add('hidden'); 
                    
                    if (activeScreenId === i) {
                        selectScreen(1);
                    }
                }
            }

            // === NEW LOGIC: Hide/Show the Select Screen section ===
            const selectSection = document.getElementById('select-screen-section');
            if (numberOfScreens === 1) {
                selectSection.style.display = 'none'; // Hide in Single mode
            } else {
                selectSection.style.display = 'block'; // Show in Double or Quad mode
            }
        }

        function selectScreen(screenNumber) {
            // 1. Reset all screens
            for (let i = 1; i <= 4; i++) {
                const screenEl = document.getElementById('screen-' + i);
                screenEl.classList.remove('active');
                
                // If it DOES NOT have a video player inside, rebuild the dim standby look
                if (!screenEl.querySelector('iframe')) {
                    screenEl.innerHTML = `
                        <img class="standby-mascot" src="images/wally-large.png" alt="Wally">
                        <div class="standby-number">${i}</div>
                    `;
                }

                document.getElementById('btn-select-' + i).classList.remove('active-viewer');
            }

            // 2. Set the new active screen
            activeScreenId = screenNumber;
            const newActiveScreen = document.getElementById('screen-' + activeScreenId);
            newActiveScreen.classList.add('active');
            
            // 3. If the newly active screen is empty, give it the brightly colored "READY" state
            if (!newActiveScreen.querySelector('iframe')) {
                newActiveScreen.innerHTML = `
                    <img class="standby-mascot active-mascot" src="images/wally-large.png" alt="Wally">
                    <div class="standby-number active-number">${activeScreenId}</div>
                `;
            }

            // 4. Update the sidebar buttons
            document.getElementById('btn-select-' + activeScreenId).classList.add('active-viewer');
        }

        // Updated to accept both name and URL
        function setChannel(channelName, channelUrl) {
            const activeScreen = document.getElementById('screen-' + activeScreenId);
            
            // Wipe out the text and drop in the video player
            // Sandbox is REMOVED so the streams can load natively
            activeScreen.innerHTML = `
                <iframe 
                    src="${channelUrl}" 
                    allow="autoplay; fullscreen; encrypted-media" 
                    allowfullscreen>
                </iframe>
            `;
            
            // Strip any padding so the video sits flush against the edges
            activeScreen.style.padding = "0";
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('menu-toggle');
            
            // Slide the sidebar open or closed
            sidebar.classList.toggle('collapsed');
            
            // Check if the sidebar is now closed (collapsed)
            if (sidebar.classList.contains('collapsed')) {
                // If closed, bring the Menu button back
                toggleBtn.style.display = 'block';
            } else {
                // If open, make the Menu button completely disappear
                toggleBtn.style.display = 'none';
            }
        }

        // === TV REMOTE SPATIAL NAVIGATION ENGINE ===
        document.addEventListener('keydown', function(e) {
            const keys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'];
            
            // If the key pressed isn't a TV remote key, ignore it
            if (!keys.includes(e.key)) return;

            // If the user presses the Center button, trigger a click on whatever is highlighted
            if (e.key === 'Enter') {
                e.preventDefault();
                if (document.activeElement && document.activeElement.click) {
                    document.activeElement.click();
                }
                return;
            }

            e.preventDefault(); // Stop the whole page from scrolling when using the D-Pad

            const currentElement = document.activeElement;
            // Grab EVERY button that is currently visible on the screen
            const focusableElements = Array.from(document.querySelectorAll('button, .channel-btn')).filter(el => {
                const rect = el.getBoundingClientRect();
                // Check if it's visible (not display: none, width > 0)
                return rect.width > 0 && rect.height > 0 && window.getComputedStyle(el).visibility !== 'hidden';
            });

            if (!focusableElements.length) return;

            // If nothing is focused, jump to the first available button
            if (!currentElement || !focusableElements.includes(currentElement)) {
                focusableElements[0].focus();
                return;
            }

            const currentRect = currentElement.getBoundingClientRect();
            let bestMatch = null;
            let shortestDistance = Infinity;

            // Loop through all visible buttons to find the closest one in the direction pressed
            focusableElements.forEach(el => {
                if (el === currentElement) return;

                const rect = el.getBoundingClientRect();
                let isValidDirection = false;
                let distance = Infinity;

                // Center points for accurate math
                const currentCenterX = currentRect.left + (currentRect.width / 2);
                const currentCenterY = currentRect.top + (currentRect.height / 2);
                const targetCenterX = rect.left + (rect.width / 2);
                const targetCenterY = rect.top + (rect.height / 2);

                if (e.key === 'ArrowRight' && targetCenterX > currentCenterX) {
                    isValidDirection = true;
                    // Heavily weight the X axis, lightly penalize Y axis drift
                    distance = Math.pow(targetCenterX - currentCenterX, 2) + Math.pow(targetCenterY - currentCenterY, 2) * 5;
                } else if (e.key === 'ArrowLeft' && targetCenterX < currentCenterX) {
                    isValidDirection = true;
                    distance = Math.pow(currentCenterX - targetCenterX, 2) + Math.pow(targetCenterY - currentCenterY, 2) * 5;
                } else if (e.key === 'ArrowDown' && targetCenterY > currentCenterY) {
                    isValidDirection = true;
                    distance = Math.pow(targetCenterY - currentCenterY, 2) + Math.pow(targetCenterX - currentCenterX, 2) * 5;
                } else if (e.key === 'ArrowUp' && targetCenterY < currentCenterY) {
                    isValidDirection = true;
                    distance = Math.pow(currentCenterY - targetCenterY, 2) + Math.pow(targetCenterX - currentCenterX, 2) * 5;
                }

                if (isValidDirection && distance < shortestDistance) {
                    shortestDistance = distance;
                    bestMatch = el;
                }
            });

            if (bestMatch) {
                bestMatch.focus();
            }
        });

        // Initialize TV Focus on boot
        document.getElementById('menu-toggle').focus();

    </script>
