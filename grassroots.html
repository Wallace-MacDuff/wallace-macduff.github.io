<body class="focus-mode">

<div class="focus-overlay"></div>

<div class="farm-stage">
    
    <div class="main-layout">

        <div class="layout-col-left">
            <div class="signpost-menu">
                <img src="images/post.png" alt="Signpost" class="post-wood protected-art">
                <div class="hanging-signs">
                    <a href="index.html"><img src="images/nav-home.png" alt="Home" class="menu-sign protected-art"></a>
                    <a href="story.html"><img src="images/nav-story.png" alt="Our Story" class="menu-sign protected-art"></a>
                    <a href="books.html"><img src="images/nav-books.png" alt="Books" class="menu-sign protected-art"></a>
                    <a href="fun.html"><img src="images/nav-fun.png" alt="Fun" class="menu-sign protected-art"></a>
                    <a href="contact.html"><img src="images/nav-contact.png" alt="Contact" class="menu-sign protected-art"></a>
                </div>
            </div>
        </div>

        <div class="layout-col-center">
            
            <a href="index.html" class="marquee-wrapper">
                <img src="images/sign.png" alt="Wallace MacDuff" class="marquee-sign protected-art">
            </a>
            
            <div class="parchment-runner">
                <div class="content-area" id="parchmentContent" tabindex="0" style="outline: none;">
                    <a href="index.html" class="close-btn" style="position: sticky; top: 0px; margin-top: -15px; margin-left: -25px; z-index: 999; display: inline-block; background-color: #f4e1b0; padding: 4px 8px; border: 1px solid #603416; border-radius: 25px; box-shadow: 0px 4px 8px rgba(0,0,0,0.2);">✘ </a> 
                    
                    <h1 style="margin-top: -10px !important; margin-bottom: -10px !important;">Launch Party!</h1>

                    <div class="storybook-divider" style="margin-top: 30px !important; margin-bottom: 30px !important;"></div>

                    <img src="images/wally-launch-1.png" alt="Wally's Launch Party" class="protected-art trailer-img">
                    <img src="images/wally-launch-2.png" alt="Wally's Launch Party" class="protected-art trailer-img">
                    <img src="images/wally-launch-3.png" alt="Wally's Launch Party" class="protected-art trailer-img">
                    <img src="images/wally-launch-4.png" alt="Wally's Launch Party" class="protected-art trailer-img">
                    <img src="images/wally-launch-5.png" alt="Wally's Launch Party" class="protected-art trailer-img">

        </div>
        
    </div>
</div>

<script>
    const parchment = document.querySelector('.content-area');
    parchment.focus();
    let isDown = false;
    let startY;
    let scrollTop;

    parchment.addEventListener('mousedown', (e) => {
        isDown = true;
        startY = e.pageY - parchment.offsetTop;
        scrollTop = parchment.scrollTop;
    });

    parchment.addEventListener('mouseleave', () => {
        isDown = false;
    });

    parchment.addEventListener('mouseup', () => {
        isDown = false;
    });

    parchment.addEventListener('mousemove', (e) => {
        if (!isDown) return; 
        e.preventDefault(); 
        const y = e.pageY - parchment.offsetTop;
        const walk = (y - startY) * 1.5; 
        parchment.scrollTop = scrollTop - walk;
    });
</script>

</body>
